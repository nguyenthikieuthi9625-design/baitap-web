<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Ghép Đôi Thẻ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { height: 100px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 8px; }
        .card-front { background: #3498db; color: white; }
        .card-back { background: #e74c3c; color: white; transform: rotateY(180deg); }
        .card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Số lượt click: <span id="moves">0</span></h1>
    <div class="grid" id="gameGrid"></div>
    <button onclick="location.reload()">Chơi lại</button>

    <script>
        const symbols = ['🍎', '🍌', '🍇', '🍓', '🍎', '🍌', '🍇', '🍓'];
        let moves = 0, flippedCards = [], matchedCount = 0;
        symbols.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('gameGrid');
        symbols.forEach((sym, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-inner"><div class="card-front">?</div><div class="card-back">${sym}</div></div>`;
            card.onclick = () => flipCard(card, sym);
            grid.appendChild(card);
        });

        function flipCard(card, sym) {
            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                flippedCards.push({ card, sym });
                if (flippedCards.length === 2) {
                    document.getElementById('moves').innerText = ++moves;
                    if (flippedCards[0].sym === flippedCards[1].sym) {
                        matchedCount += 2;
                        flippedCards = [];
                        if (matchedCount === 8) alert('Chúc mừng! Bạn đã thắng!');
                    } else {
                        setTimeout(() => {
                            flippedCards.forEach(item => item.card.classList.remove('flipped'));
                            flippedCards = [];
                        }, 1000);
                    }
                }
            }
        }
    </script>
</body>
</html>
