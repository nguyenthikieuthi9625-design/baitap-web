<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Ghép Đôi Thẻ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .game-container { display: grid; gap: 10px; margin: 20px auto; max-width: 400px; }
        /* Responsive: 2 cột mobile, 4 cột desktop */
        @media (max-width: 600px) { .game-container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 601px) { .game-container { grid-template-columns: repeat(4, 1fr); } }

        .card { height: 100px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 8px; }
        .card-front { background: #3498db; color: white; }
        .card-back { background: #2ecc71; color: white; transform: rotateY(180deg); }
        .card:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>Game Ghép Đôi</h1>
    <p>Số lượt click: <span id="moves">0</span></p>
    <div class="game-container" id="board"></div>
    <button onclick="location.reload()">Chơi lại</button>

    <script>
        const cards = ['🍎', '🍎', '🍌', '🍌', '🍇', '🍇', '🍓', '🍓'];
        let flippedCards = [];
        let moves = 0;
        let matched = 0;

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        const board = document.getElementById('board');
        shuffle(cards).forEach((symbol, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-inner"><div class="card-front">?</div><div class="card-back">${symbol}</div></div>`;
            card.dataset.symbol = symbol;
            card.onclick = flipCard;
            board.appendChild(card);
        });

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                this.classList.add('flipped');
                flippedCards.push(this);
                if (flippedCards.length === 2) {
                    moves++;
                    document.getElementById('moves').innerText = moves;
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.symbol === c2.dataset.symbol) {
                matched += 2;
                flippedCards = [];
                if (matched === 8) alert('Chúc mừng! Bạn đã thắng sau ' + moves + ' lượt.');
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }
    </script>
</body>
</html>
